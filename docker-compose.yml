version: '3'
services:
    nginx:
      image: "nginx:1.21.0"
      ports: 
        #- "80:80"
        #- "8080:8080"
        - "8888:8888"
      container_name: "nginx121"
      restart: always
      volumes: 
        - ${PWD}/server/nginx/conf.d:/etc/nginx/conf.d/:rw
        - ${PWD}/server/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        - ${PWD}logs/server-logs/nginx/logs:/var/log/nginx/:rw
        - ${WWW_PATH}:/usr/share/nginx/html/:rw 
      # logging:
      #   driver: "json-file"
      #   options:
      #      max-size: "1000k"
      #      max-file: "10"
      cap_add:
          - ALL    
      environment:
          RACK_ENV: development
          SESSION_SECRET: 
      networks:
        - dev  

    php74:
      build:
        context: server/php/php74
        dockerfile: Dockerfile
        args:
          PHP74_VERSION: ${PHP74_VERSION}
          PHP74_PATH: ${PHP74_PATH}
      ports: 
        - "9100:9000"    
      container_name: "php74"
      restart: always
      volumes: 
        - ${WWW_PATH}:/usr/share/nginx/html/:rw 
        - ${PWD}/server/php/php74/conf:/usr/local/etc/php:rw
        #- ${PWD}/server/php/php74/conf/php.ini:/usr/local/etc/php/php.ini:rw 
      depends_on:
          - nginx
      networks:
         - dev
         # - sqlnet:
         #   ipv4_address: 192.168.1.5

