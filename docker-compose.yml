version: '3'
services:
    nginx:
      build:
        context: server/nginx
        dockerfile: Dockerfile
        args:
          NGINX_VERSION: ${NGINX_VERSION}
          NGINX_HTML: ${NGINX_HTML}
      ports: 
        - "80:80"
        - "8080:8080"
        - "8888:8888"
      container_name: "nginx121"
      restart: always
      volumes: 
        - ${PWD}/server/nginx/conf.d:/etc/nginx/conf.d/:rw
        - ${PWD}/server/nginx/nginx.conf:/etc/nginx/nginx.conf:rw
        - ${PWD}/logs/server-logs/nginx/:/var/log/nginx/:rw
        - ${NGINX_HTML}:/usr/share/nginx/html/:rw 
      cap_add:
          - ALL    
      environment:
          RACK_ENV: development
          SESSION_SECRET: 
      networks:
        - dev  



networks:
    dev:
        driver: bridge  