version: '3'
services:
    nginx:
      build:
        context: server/nginx/nginx1.21.0
        dockerfile: Dockerfile
        args:
          NGINX_VERSION: ${NGINX_VERSION}
          NGINX_HTML: ${NGINX_HTML}
      ports: 
        - "80:80"
        - "8080:8080"
        - "8888:8888"
      container_name: "nginx121"
      restart: always
      volumes: 
        - ${NGINX_HTML}:/usr/share/nginx/html/:rw 
        - ${PWD}/logs/server-logs/nginx/nginx1.21.0/:/var/log/nginx/:rw
        - ${PWD}/server/nginx/nginx1.21.0/conf.d:/etc/nginx/conf.d/:rw
        - ${PWD}/server/nginx/nginx1.21.0/nginx.conf:/etc/nginx/nginx.conf:rw
        - ${PWD}/server/nginx/nginx1.21.0/nginx-modules/:/usr/lib/nginx/modules/:rw
      cap_add:
          - ALL    
      environment:
          RACK_ENV: development
          SESSION_SECRET: 
      networks:
        - dev  
        
    php74:
      build:
        context: server/php/php74
        dockerfile: Dockerfile
        args:
          PHP74_VERSION: ${PHP74_VERSION}
          PHP74_PATH: ${PHP74_PATH}
      ports: 
        - "9000:9000" 
        - "9100:9100"      
      container_name: "php74"
      restart: always
      volumes: 
        - ${WWW_PATH}:/var/www/html/:rw 
        - ${PWD}/server/php/php74/:/usr/local/etc/:rw
      depends_on:
          - nginx
      networks:
          - dev


networks:
    dev:
        driver: bridge  