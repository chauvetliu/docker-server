server {
  listen 80;
  server_name  my.cp.youxinpai.com;
  root /Users/liuxiaowei/Documents/youxinpai/cp.youxinpai.com;
  index index.php index.html;

  location ~* \.(jpg|jpeg|gif|css|png|js|ico)$ {
    access_log off;
    expires max;
  }
  
  location ~ \.php$ {
    include fastcgi_params;
    include yxp_cp_env/*;
  }

  location ~ /\.ht {
    deny  all;
  }

  if (!-e $request_filename) {
    rewrite ^/(.*)$ /index.php?$1 last;
    break;
  }

  access_log /Users/liuxiaowei/Documents/logs/nginx/$server_name.log;
}

